<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kaz's Dumb Website</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="wrapper">
    <header class="topbar">
      <div class="brand">
        <span class="badge">modern</span>
        <h1>Kaz’s Dumb Website</h1>
      </div>

      <nav class="nav">
        <a href="/">Home</a>
        <a href="/socials/">Socials</a>
        <a href="/games/">Games</a>
        <a href="/friends/">Friends</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Welcome</h2>
      <p>This is the hub. Pick where you wanna go.</p>
    </section>

    <section class="grid">
      <a class="cardLink" href="/socials/">
        <div class="cardTop">
          <div class="emoji">💬</div>
          <div class="cardTitle">Socials</div>
        </div>
        <div class="cardDesc">Discord + links</div>
      </a>

      <a class="cardLink" href="/games/">
        <div class="cardTop">
          <div class="emoji">🎮</div>
          <div class="cardTitle">Games</div>
        </div>
        <div class="cardDesc">Play my stuff (and future complicated games)</div>
      </a>

      <a class="cardLink" href="/friends/">
        <div class="cardTop">
          <div class="emoji">🧑‍🤝‍🧑</div>
          <div class="cardTitle">Friends</div>
        </div>
        <div class="cardDesc">The squad list</div>
      </a>
    </section>

    <div class="footer">Made with chaos ✨</div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
