<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Friends | Kaz’s Dumb Website</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Friends-only upgrades */
    .searchRow{
      margin-top: 14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .searchRow input{
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      outline: none;
    }
    .friendsGrid{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width: 720px){
      .friendsGrid{ grid-template-columns: repeat(3, 1fr); }
    }
    .friendCard{
      display:block;
      text-decoration:none;
      color:inherit;
      border:1px solid rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border-radius: 18px;
      overflow:hidden;
      box-shadow: var(--shadow);
      transition: transform .15s ease, border-color .15s ease;
      touch-action: manipulation;
    }
    .friendCard:active{ transform: scale(0.985); }
    @media (hover:hover){
      .friendCard:hover{ transform: translateY(-2px); border-color: rgba(255,255,255,0.28); }
    }
    .friendTop{
      height: 120px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      background: rgba(0,0,0,0.16);
    }
    .friendTop img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .emojiCover{
      font-size: 46px;
      opacity: 0.9;
    }
    .friendBody{
      padding: 14px;
    }
    .friendName{
      font-weight: 900;
      font-size: 18px;
      margin:0;
    }
    .friendTag{
      margin-top: 6px;
      color: rgba(255,255,255,0.70);
      font-size: 13px;
    }
    .empty{
      margin-top: 14px;
      color: rgba(255,255,255,0.7);
      text-align:center;
      padding: 22px;
      border-radius: 16px;
      border:1px dashed rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="wrapper">
    <header class="topbar">
      <div class="brand">
        <span class="badge">friends</span>
        <h1>Kaz’s Dumb Website</h1>
      </div>

      <nav class="nav">
        <a href="/">Home</a>
        <a href="/socials/">Socials</a>
        <a href="/games/">Games</a>
        <a href="/friends/">Friends</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Friends</h2>
      <p>Click a card to open a profile like <b>/friends/mjood/</b>.</p>
    </section>

    <div class="searchRow">
      <input id="search" placeholder="Search friends..." autocomplete="off" />
    </div>

    <section class="friendsGrid" id="grid"></section>
    <div class="empty" id="empty" style="display:none;">No matches 😭</div>

    <div class="footer">/friends ✅</div>
  </div>

  <script src="/friends/data.js"></script>
  <script src="/js/main.js"></script>

  <script>
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const search = document.getElementById("search");

    function cardHTML(f){
      const href = `/friends/${f.id}/`;
      const cover = f.image
        ? `<img src="${f.image}" alt="${f.name}">`
        : `<div class="emojiCover">${f.coverEmoji || "🙂"}</div>`;

      return `
        <a class="friendCard" href="${href}">
          <div class="friendTop">${cover}</div>
          <div class="friendBody">
            <div class="friendName">${f.name}</div>
            <div class="friendTag">${f.tagline || ""}</div>
          </div>
        </a>
      `;
    }

    function render(list){
      grid.innerHTML = list.map(cardHTML).join("");
      empty.style.display = list.length ? "none" : "block";
    }

    const friends = (window.FRIENDS || []).slice();
    render(friends);

    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      const filtered = friends.filter(f =>
        (f.name || "").toLowerCase().includes(q) ||
        (f.tagline || "").toLowerCase().includes(q) ||
        (f.id || "").toLowerCase().includes(q)
      );
      render(filtered);
    });
  </script>
</body>
</html>
