<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mjood | Friends</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .profile{
      margin-top: 14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      overflow:hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .banner{
      height: 180px;
      background: rgba(0,0,0,0.18);
      position:relative;
    }
    .banner img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .content{
      padding: 16px;
    }
    .nameRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .nameRow h2{
      margin:0;
      font-size: 24px;
      font-weight: 900;
    }
    .tag{
      color: rgba(255,255,255,0.70);
      margin-top: 6px;
    }
    .gallery{
      margin-top: 14px;
      display:grid;
      gap:10px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px){
      .gallery{ grid-template-columns: repeat(3, 1fr); }
    }
    .shot{
      border-radius: 16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
    }
    .shot img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      aspect-ratio: 1 / 1;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="wrapper">
    <header class="topbar">
      <div class="brand">
        <span class="badge">friend</span>
        <h1>Kaz’s Dumb Website</h1>
      </div>

      <nav class="nav">
        <a href="/">Home</a>
        <a href="/socials/">Socials</a>
        <a href="/games/">Games</a>
        <a href="/friends/">Friends</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Friend Profile</h2>
      <p>This is <b>/friends/mjood/</b>. You can add images + jokes here.</p>
    </section>

    <section class="profile">
      <div class="banner">
        <!-- banner image (optional) -->
        <img src="/assets/friends/mjoodi/mjood1.jpg" alt="Mjood banner" />
      </div>

      <div class="content">
        <div class="nameRow">
          <h2>Mjood</h2>
          <a href="/friends/">← Back</a>
        </div>

        <div class="tag">bro is built different</div>

        <p style="color: rgba(255,255,255,0.82); margin-top: 12px;">
          MY LOVE
        </p>

        <h3 style="margin:16px 0 8px;">Gallery</h3>
        <div class="gallery">
          <div class="shot"><img src="/assets/friends/mjoodi/mjood2.jpg" alt="Mjood pic 1"></div>
          <!-- add more later -->
          <!-- <div class="shot"><img src="/assets/friends/mjood2.png" alt="Mjood pic 2"></div> -->
        </div>
      </div>
    </section>

    <div class="footer">/friends/mjood ✅</div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
