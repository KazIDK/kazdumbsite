<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Flappy | Kaz’s Dumb Website</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="./game.css" />
</head>
<body>

  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="wrapper">
    <header class="topbar">
      <div class="brand">
        <span class="badge">game</span>
        <h1>Kaz’s Dumb Website</h1>
      </div>

      <nav class="nav">
        <a href="/">Home</a>
        <a href="/socials/">Socials</a>
        <a href="/games/">Games</a>
        <a href="/friends/">Friends</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Flappy</h2>
      <p>Tap/click to flap. Space also works on PC.</p>
    </section>

    <section class="gameWrap">
      <div class="hud">
        <div class="hudCard">
          <div class="hudLabel">Score</div>
          <div class="hudValue" id="score">0</div>
        </div>
        <div class="hudCard">
          <div class="hudLabel">Best</div>
          <div class="hudValue" id="best">0</div>
        </div>

        <button class="hudBtn" id="startBtn">Start</button>
        <button class="hudBtn" id="restartBtn">Restart</button>
        <a class="hudBtn" href="/games/">Back</a>
      </div>

      <div class="boardCard">
        <canvas id="game"></canvas>

        <div class="overlay" id="overlay">
          <div class="overlayTitle" id="overlayTitle">FLAPPY</div>
          <div class="overlayText" id="overlayText">Tap / Click / Space</div>
        </div>
      </div>

      <div class="hint">
        Mobile: tap anywhere on the game. PC: click or Space.
      </div>
    </section>

    <div class="footer">/games/flappy ✅</div>
  </div>

  <script src="/js/main.js"></script>
  <script src="./game.js"></script>
</body>
</html>
